<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Edit Panel</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
      label { display:block; margin-top: .75rem; }
      textarea { width:100%; min-height:120px; }
      input[type=text] { width:100%; }
      button { margin-top: 1rem; padding: .5rem 1rem; }
      #status { margin-top: 1rem; color: #444; }
    </style>
  </head>
  <body>
    <h1>AI Edit Panel</h1>
    <p>This panel verifies Telegram WebApp init_data and fetches a short-lived JWT to call the AI-edit API.</p>

    <div>
      <label>Telegram init_data (paste Web App initData here):</label>
      <textarea id="init_data" placeholder="user={\"id\":123,...}\nhash=...\n..."></textarea>
      <button id="btn_auth">Get JWT</button>
    </div>

    <div style="margin-top:1.25rem;">
      <label>JWT (stored locally):</label>
      <textarea id="jwt" readonly></textarea>
    </div>

    <hr />

    <h3>Create AI edit</h3>
    <label>Repo (owner/repo):</label>
    <input type="text" id="repo" value="fearrariiii-wq/svoyak-bot" />
    <label>Path (file path in repo):</label>
    <input type="text" id="path" value="main.py" />
    <label>Description (what to change):</label>
    <textarea id="description">Make players able to answer during reading and protect against KeyError</textarea>
    <button id="btn_edit">Run AI Edit</button>

    <div id="status"></div>

    <script>
      const API_BASE = window.location.origin;

      document.getElementById('btn_auth').addEventListener('click', async () => {
        const initData = document.getElementById('init_data').value.trim();
        if(!initData){ alert('Paste init_data'); return; }
        const res = await fetch(API_BASE + '/api/auth/init', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({init_data: initData})
        });
        const data = await res.json();
        if(res.ok){
          localStorage.setItem('admin_jwt', data.jwt);
          document.getElementById('jwt').value = data.jwt;
          setStatus('Got JWT, expires in ' + data.expires_in_minutes + ' minutes');
        } else {
          setStatus('Auth error: ' + (data.detail || JSON.stringify(data)));
        }
      });

      document.getElementById('btn_edit').addEventListener('click', async () => {
        const jwt = localStorage.getItem('admin_jwt');
        if(!jwt){ setStatus('No JWT — authenticate first'); return; }
        const body = {
          repo: document.getElementById('repo').value.trim(),
          path: document.getElementById('path').value.trim(),
          description: document.getElementById('description').value.trim()
        };
        setStatus('Calling AI...');
        const res = await fetch(API_BASE + '/api/ai-edit', {
          method: 'POST', headers: {'Content-Type':'application/json', 'Authorization':'Bearer ' + jwt}, body: JSON.stringify(body)
        });
        const data = await res.json();
        if(res.ok){
          setStatus('PR created: ' + data.pr_url);
        } else {
          setStatus('Error: ' + (data.detail || JSON.stringify(data)));
        }
      });

      function setStatus(msg){ document.getElementById('status').textContent = msg; }

      // load JWT if present
      const existing = localStorage.getItem('admin_jwt');
      if(existing) document.getElementById('jwt').value = existing;
    </script>
  </body>
</html>
