# Minimal frontend for the Telegram Web App (mini-app)
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Code Editor</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; padding: 1rem; }
      textarea { width: 100%; height: 300px; }
      input, button { padding: 0.5rem; }
    </style>
  </head>
  <body>
    <h2>AI Code Editor (mini-app)</h2>
    <p>Note: This frontend must NOT contain any secret keys. All AI calls go through the backend.</p>
    <label>Repo (owner/repo): <input id="repo" value="fearrariiii-wq/svoyak-bot"></label><br><br>
    <label>File path: <input id="path" value="main.py"></label><br><br>
    <label>Description of change (what to change):</label><br>
    <textarea id="desc">Make players able to answer during reading and protect against KeyError.</textarea><br>
    <button id="run">Run AI Patch</button>
    <pre id="out"></pre>

    <script>
      document.getElementById('run').onclick = async () => {
        const repo = document.getElementById('repo').value;
        const path = document.getElementById('path').value;
        const description = document.getElementById('desc').value;

        const resp = await fetch('/api/ai-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ repo, path, description })
        });
        const data = await resp.json();
        document.getElementById('out').textContent = JSON.stringify(data, null, 2);
      };
    </script>
  </body>
</html>
